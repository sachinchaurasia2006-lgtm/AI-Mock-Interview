spring:
  application.name: mockmate-api
  profiles.default: dev
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/mockmate?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
  jpa:
    hibernate.ddl-auto: update
    open-in-view: false
  servlet.multipart.max-file-size: 10MB
  servlet.multipart.max-request-size: 10MB
app:
  jwt.secret: ${JWT_SECRET:replace-this-with-a-long-32-byte-minimum-secret-key}
  jwt.expiration-ms: 86400000
  upload-dir: ${UPLOAD_DIR:uploads}
  openai:
    enabled: ${OPENAI_ENABLED:false}
    api-key: ${OPENAI_API_KEY:}
    model: ${OPENAI_MODEL:gpt-4o-mini}
